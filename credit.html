<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBank | Electricity Bill</title>
    <link rel="stylesheet" href="css/electricity.css">
</head>
<body>
    <div class="bill-wrapper">
        <div class="top-nav">
            <a href="home.html" class="back-link">← Back</a>
        </div>

        <div class="bill-card">
            <div class="header">
                <h2>Bills Payment</h2>
                <p>Fast & Secure Utility Payments</p>
            </div>

            <form id="paymentForm">
                <div class="form-group">
                    <label>Bill Type</label>
                    <div class="select-wrapper">
                        <select id="billType">
                            <option value="electricity">Credit</option>
                            
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount" placeholder="Enter amount" required>
                </div>

                <button type="button" class="pay-btn" onclick="processPayment()">Pay Bill Now</button>
            </form>
        </div>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h3>Payment Successful!</h3>
            <p id="receiptMsg"></p>
            <button class="close-btn" onclick="closeModal()">Done</button>
        </div>
    </div>

    <script type="module">
   import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"; // ADDED
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app); // INITIALIZED
    const db = getFirestore(app);

    // 2. Define the payment function
    window.processPayment = async function() {
        const amountInput = document.getElementById('amount').value;
        const billSelect = document.getElementById('billType');
        const billName = billSelect.options[billSelect.selectedIndex].text;

        if (amountInput <= 0) {
            alert("Please enter a valid amount.");
            return;
        }

        // Verify user is logged in
        if (!auth.currentUser) {
            alert("Session expired. Please login again.");
            window.location.href = "index.html";
            return;
        }

        const btn = document.querySelector('.pay-btn');
        btn.innerHTML = "Processing...";
        btn.disabled = true;

        try {
            // 3. Write to the "transaction" collection with userID
            await addDoc(collection(db, "transaction"), {
                name: billName + " Payment",
                amount: Number(amountInput),
                type: "paid",                // Subtracts from balance
                date: serverTimestamp(),
                userID: auth.currentUser.uid // THE FIX: Links this to Rohan's balance
            });

            // 4. Show Success UI
            document.getElementById('receiptMsg').innerText = `₹${amountInput} has been paid successfully for ${billName}.`;
            document.getElementById('successModal').style.display = "flex";
        } catch (error) {
            console.error("Error adding transaction: ", error);
            alert("Security Error: Check your Firebase Rules.");
        } finally {
            btn.innerHTML = "Pay Bill Now";
            btn.disabled = false;
        }
    }

    window.closeModal = function() {
        document.getElementById('successModal').style.display = "none";
        window.location.href = "home.html";
    }
</script>
</body>
</html>
