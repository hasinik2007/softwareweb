<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBank | Secure Transfer</title>
    <link rel="stylesheet" href="css/bank.css">
</head>
<body>
    <div class="transfer-wrapper">
        <nav class="top-nav">
            <a href="home.html" class="back-link">← Back</a>
            <h1>Money Transfer</h1>
        </nav>

        <div class="transfer-card">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab(event, 'self')">Self Account</button>
                <button class="tab-btn" onclick="openTab(event, 'acc')">Bank & IFSC</button>
                <button class="tab-btn" onclick="openTab(event, 'upi')">UPI ID</button>
            </div>

            <div id="self" class="tab-content active">
                <div class="input-group">
                    <label>Transfer to Linked Account</label>
                    <select id="selfAcc">
                        <option>Savings Account (...8822)</option>
                        <option>Business Account (...1199)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="selfAmt" placeholder="Enter Amount">
                </div>
                <button class="action-btn" onclick="processTransfer('Self Account')">Transfer Now</button>
            </div>

            <div id="acc" class="tab-content">
                <div class="input-group">
                    <label>Select Recipient Bank</label>
                    <select>
                        <option>State Bank of India</option>
                        <option>HDFC Bank</option>
                        <option>ICICI Bank</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Account Number (10 Digits)</label>
                    <input type="text" maxlength="10" placeholder="e.g. 1234567890">
                </div>
                <div class="input-group">
                    <label>IFSC Code</label>
                    <input type="text" placeholder="e.g. SBIN0001234">
                </div>
                <div class="input-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="accAmt" placeholder="Enter Amount">
                </div>
                <button class="action-btn" onclick="processTransfer('External Bank Account')">Confirm Transfer</button>
            </div>

            <div id="upi" class="tab-content">
                <div class="input-group">
                    <label>Recipient UPI ID</label>
                    <input type="text" id="upiInput" placeholder="username@bankhandle">
                </div>
                <p class="syntax-note">Standard Syntax: username@bankid (e.g., rohan@autobank)</p>
                <button class="action-btn" onclick="triggerUPI()">Verify & Pay</button>
            </div>
        </div>
    </div>

    <div id="statusModal" class="modal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h3>Payment Sent</h3>
            <p id="modalMsg"></p>
            <button class="done-btn" onclick="location.href='home.html'">Return to Dashboard</button>
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function processTransfer(type) {
            document.getElementById('modalMsg').innerText = `Transaction to ${type} processed successfully.`;
            document.getElementById('statusModal').style.display = 'flex';
        }

        function triggerUPI() {
            let upi = document.getElementById('upiInput').value;
            if(!upi.includes('@')) return alert("Invalid UPI Syntax. Use: user@bank");
            
            let amount = prompt("UPI ID Verified. Enter Amount to Pay (₹):");
            if(amount) {
                document.getElementById('modalMsg').innerText = `₹${amount} paid successfully to ${upi}`;
                document.getElementById('statusModal').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
