<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBank | Transaction History</title>
    <link rel="stylesheet" href="css/history.css">
</head>
<body>
    <div class="history-container">
        <div class="top-nav">
            <a href="home.html" class="back-btn">← Back</a>
        </div>

        <div class="history-header">
            <h2>Transaction History</h2>
            <button class="filter-btn">Filter by Date</button>
        </div>

        <div class="transaction-list">
            <div class="transaction-item">
                <div class="icon-box paid">
                    <span class="icon">↑</span>
                </div>
                <div class="details">
                    <span class="name">Paid to Rajesh Kumar</span>
                    <span class="date">Oct 12, 2025 • 02:30 PM</span>
                </div>
                <div class="amount negative">- $450.00</div>
            </div>

            <div class="transaction-item">
                <div class="icon-box credited">
                    <span class="icon">↓</span>
                </div>
                <div class="details">
                    <span class="name">Salary Credited</span>
                    <span class="date">Oct 01, 2025 • 09:00 AM</span>
                </div>
                <div class="amount positive">+ $2,800.00</div>
            </div>

            <div class="transaction-item">
                <div class="icon-box paid">
                    <span class="icon">↑</span>
                </div>
                <div class="details">
                    <span class="name">Electricity Bill Payment</span>
                    <span class="date">Sep 28, 2025 • 11:15 AM</span>
                </div>
                <div class="amount negative">- $85.20</div>
            </div>

            <div class="transaction-item">
                <div class="icon-box credited">
                    <span class="icon">↓</span>
                </div>
                <div class="details">
                    <span class="name">Refund from Amazon</span>
                    <span class="date">Sep 25, 2025 • 04:45 PM</span>
                </div>
                <div class="amount positive">+ $12.50</div>
            </div>
        </div>
    </div>
</body>
</html>
