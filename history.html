<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Prime | Transaction History</title>
    <link rel="stylesheet" href="css/history.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="history-container">
        <div class="top-nav">
            <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <div class="history-header">
            <h2>Transaction History</h2>
            <button class="filter-btn"><i class="fas fa-calendar-alt"></i> Filter by Date</button>
        </div>

        <div class="transaction-list" id="transaction-list">
            </div>
    </div>

    <script type="module">
        

      import { firebaseConfig } from './config.js'; // Import hidden keys
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"; // Added Auth
    import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const listElement = document.getElementById('transaction-list');

        // Listening to the 'transaction' collection
        const q = query(collection(db, "transaction"), orderBy("date", "desc"));
        
        onSnapshot(q, (snapshot) => {
            listElement.innerHTML = ""; 
            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Handling lowercase field names from your database
                const type = data.type ? data.type.toLowerCase() : "paid";
                const isPositive = type === "credited";
                const amountValue = data.amount || 0;
                const dateString = data.date ? data.date.toDate().toLocaleString('en-IN') : "Pending...";
                
                listElement.innerHTML += `
                    <div class="transaction-item">
                        <div class="icon-box ${type}">
                            <span class="icon">${isPositive ? '↓' : '↑'}</span>
                        </div>
                        <div class="details">
                            <span class="name">${data.name || "Banking Transaction"}</span>
                            <span class="date">${dateString}</span>
                        </div>
                        <div class="amount ${isPositive ? 'positive' : 'negative'}">
                            ${isPositive ? '+' : '-'} ₹${amountValue}
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
