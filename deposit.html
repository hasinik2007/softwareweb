<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBank | Deposit Center</title>
    <link rel="stylesheet" href="css/deposit.css">
</head>
<body>
    <div class="deposit-wrapper">
        <div class="top-nav">
            <a href="home.html" class="back-link">← Back to Home</a>
        </div>

        <div class="deposit-card">
            <div class="header">
                <h2>Cashier</h2>
                <p>Secure Transaction Portal</p>
            </div>

            <form id="depositForm">
                <div class="form-group">
                    <label>Transaction Type</label>
                    <div class="select-wrapper">
                        <select id="transType">
                            <option value="self">Self Deposit</option>
                            <option value="term">Term Deposit</option>
                            <option value="mobile">Mobile Check</option>
                            <option value="third">Third-Party</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount" placeholder="Enter amount" required>
                </div>

                <button type="button" class="process-btn" onclick="handleDeposit()">Process Deposit</button>
            </form>
        </div>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h3>Deposit Successful</h3>
            <p id="receiptMsg"></p>
            <button class="close-btn" onclick="closeModal()">Done</button>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

   

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
        } else {
            window.location.href = "index.html";
        }
    });

    window.handleDeposit = async function() {
        const amountInput = document.getElementById('amount').value;
        const category = document.getElementById('transType').value;
        const btn = document.querySelector('.process-btn');

        if (!amountInput || amountInput <= 0) {
            alert("Please enter a valid amount.");
            return;
        }

        btn.innerHTML = "Processing Security...";
        btn.disabled = true;

        try {
            // FIX: Using 'userID' (Capital ID) to match your balance calculation
            await addDoc(collection(db, "transaction"), {
                amount: parseFloat(amountInput),
                date: serverTimestamp(),
                name: `Self Deposit - ${category}`,
                type: "credited",
                userID: currentUser.uid // CHANGED FROM userId TO userID
            });

            document.getElementById('receiptMsg').innerText = `₹${amountInput} has been successfully credited.`;
            document.getElementById('successModal').style.display = "flex";
            
        } catch (error) {
            console.error("Error:", error);
            alert("Security Error: Could not save to database. Check your Rules.");
        } finally {
            btn.innerHTML = "Process Deposit";
            btn.disabled = false;
        }
    };

    window.closeModal = function() {
        document.getElementById('successModal').style.display = "none";
        window.location.href = "home.html";
    };
</script>
</body>
</html>
