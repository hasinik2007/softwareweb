<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBank | Secure Portal</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="login-card">
        <div class="header">
            <div class="logo">Auto<span>Bank</span></div>
            <p>Unified Banking Gateway</p>
        </div>

        <div class="tab-container">
            <button class="tab-link active" onclick="switchTab(event, 'customer')">Customer</button>
            <button class="tab-link" onclick="switchTab(event, 'staff')">Staff</button>
            <button class="tab-link" onclick="switchTab(event, 'admin')">Admin</button>
        </div>

        <div id="customer" class="tab-content active">
    <form onsubmit="event.preventDefault();">
        <div class="input-box">
            <label>Email Address</label>
            <input type="email" id="custEmail" placeholder="rohan@email.com" required>
        </div>
        <div class="input-box">
            <label>Password</label>
            <input type="password" id="custPass" placeholder="••••••••" required>
        </div>
        <button type="button" class="btn btn-cust" onclick="loginUser('custEmail', 'custPass')">
            Login to Dashboard
        </button>
        
        <div style="text-align: center; margin-top: 20px; font-size: 15px;">
            <span style="color: #64748b;">New to AutoBank? </span>
            <a href="signup.html" style="color: #2645f4; font-weight: 700; text-decoration: none;">Create Account</a>
        </div>

        <a href="#" class="forgot">Forgot Password?</a>
    </form>
</div>

        <div id="staff" class="tab-content">
            <form>
                <div class="input-box">
                    <label>Staff ID</label>
                    <input type="text" placeholder="STF-XXXX" required>
                </div>
                <div class="input-box">
                    <label>System Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-staff">Employee Access</button>
                 <a href="#" class="forgot">Forgot Password?</a>
            </form>
        </div>

        <div id="admin" class="tab-content">
            <form>
                <div class="input-box">
                    <label>Admin ID</label>
                    <input type="text" placeholder="Administrator Name" required>
                </div>
                <div class="input-box">
                    <label>Master Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <a href="home.html" class="btn btn-cust" style="text-decoration: none; display: inline-block;text-align:center;">
                    Login to Dashboard
                </a>
                 <a href="#" class="forgot">Forgot Password?</a>
            </form>
        </div>
    </div>

    <script type="module">
        import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Make the tab switcher global so it still works with type="module"
    window.switchTab = function(evt, portalName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-link");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        document.getElementById(portalName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // REAL LOGIN FUNCTION
    window.loginUser = async function(emailId, passId) {
        const email = document.getElementById(emailId).value;
        const password = document.getElementById(passId).value;
        const btn = event.target;

        if (!email || !password) {
            alert("Please enter both Email and Password");
            return;
        }

        btn.innerText = "Verifying Security...";
        
        try {
            await signInWithEmailAndPassword(auth, email, password);
            // On success, Firebase now knows it's Rohan
            window.location.href = "home.html";
        } catch (error) {
            alert("Security Error: " + error.message);
            btn.innerText = "Login to Dashboard";
        }
    }
</script>
</body>
</html>
