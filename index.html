<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBank | Secure Portal</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="login-card">
        <div class="header">
            <div class="logo">Auto<span>Bank</span></div>
            <p>Unified Banking Gateway</p>
        </div>

        <div class="tab-container">
            <button class="tab-link active" onclick="switchTab(event, 'customer')">Customer</button>
            <button class="tab-link" onclick="switchTab(event, 'staff')">Staff</button>
            <button class="tab-link" onclick="switchTab(event, 'admin')">Admin</button>
        </div>

        <div id="customer" class="tab-content active">
            <form>
                <div class="input-box">
                    <label>Account Number</label>
                    <input type="text" placeholder="Enter 5-digit ID" required>
                </div>
                <div class="input-box">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <a href="home.html" class="btn btn-cust" style="text-decoration: none; display: inline-block;text-align:center;">
                    Login to Dashboard
                </a>
                <a href="#" class="forgot">Forgot Password?</a>
            </form>
        </div>

        <div id="staff" class="tab-content">
            <form>
                <div class="input-box">
                    <label>Staff ID</label>
                    <input type="text" placeholder="STF-XXXX" required>
                </div>
                <div class="input-box">
                    <label>System Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-staff">Employee Access</button>
                 <a href="#" class="forgot">Forgot Password?</a>
            </form>
        </div>

        <div id="admin" class="tab-content">
            <form>
                <div class="input-box">
                    <label>Admin ID</label>
                    <input type="text" placeholder="Administrator Name" required>
                </div>
                <div class="input-box">
                    <label>Master Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-admin">System Control</button>
                 <a href="#" class="forgot">Forgot Password?</a>
            </form>
        </div>
    </div>

    <script>
        function switchTab(evt, portalName) {
            var i, tabcontent, tablinks;
            // Hide all tab contents
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            // Deactivate all buttons
            tablinks = document.getElementsByClassName("tab-link");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            // Show current tab and add active class to button
            document.getElementById(portalName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
