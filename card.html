<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBank | My Cards</title>
    <link rel="stylesheet" href="css/card.css">
</head>
<body>
    <div class="page-container">
        <nav class="top-nav">
            <a href="home.html" class="back-link">← Back</a>
            <h1>Card Management</h1>
        </nav>

        <div class="content-grid" style="margin-top:200px;" >
            <div class="bank-card">
                <div class="card-chip"></div>
                <div class="card-number">**** **** **** 8822</div>
                <div class="card-holder">
                    <span>Card Holder</span>
                    <strong>ROHAN</strong>
                </div>
                <div class="card-expiry">
                    <span>Expires</span>
                    <strong>12/28</strong>
                </div>
                <div class="card-logo">Auto<span>Bank</span></div>
            </div>

            <div class="controls-panel">
                <div class="control-item">
                    <div class="text">
                        <strong>Online Transactions</strong>
                        <p>Enable or disable e-commerce payments</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="control-item">
                    <div class="text">
                        <strong>International Usage</strong>
                        <p>Usage outside your home country</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="action-btn">View Card PIN</button>
                <button class="action-btn block">Block Card Permanently</button>
            </div>
        </div>
    </div>
</body>
</html>
